# Jetson Voice Assistant — Configuration

llm:
  model: ""                           # empty = auto-detect from server
  base_url: "http://localhost:8080"
  backend: "openai"                   # "openai" = llama.cpp OpenAI-compatible API
  max_tokens: 512
  temperature: 0.7
  timeout: 120.0
  memory_turns: 20            # past turns sent as context (benchmarked: 20 turns @ ~100 tok/turn fits ctx=8192 with headroom)
  system_prompt: "You are a helpful voice assistant running on an NVIDIA Jetson. Your responses will be spoken aloud via text-to-speech. Answer compactly and with depth: explain essential concepts precisely, without unnecessary embellishments. A response should not take longer than one minute to read aloud at a normal pace (approx. 130 words). Never use emojis, asterisks, bullet points, markdown, code blocks, or special formatting. Write numbers and units as spoken words when short."

stt:
  model: "base"                       # tiny/base/small/medium (multilingual) or tiny.en/base.en/small.en (English-only)
  device: "cuda"
  compute_type: "int8"
  language: "en"
  beam_size: 1                        # 1=greedy (fast), 5=beam (quality)

tts:
  backend: "piper"                    # kokoro (GPU, English) or piper (default, CPU, multilingual incl. German)
  voice: "af_sarah"                   # kokoro voice — af_sarah, af_bella, am_adam, bf_emma, bm_george, etc.
  speed: 0.8
  lang: "en-us"                       # kokoro language code (ignored when backend=piper)
  piper_model: "en_US-lessac-medium"  # piper model name — e.g. de_DE-thorsten-medium for German
  first_chunk_words: 5                # words before first TTS chunk is sent
  max_chunk_words: 12                 # larger chunks = fewer synthesis calls = fewer gaps

audio:
  sample_rate: 16000
  channels: 1
  input_device: null                  # null = auto-detect first USB mic; set to e.g. "USB Audio" to match by name

vad:
  use_silero: true                    # true = Silero neural VAD (much better), false = energy-only
  silero_threshold: 0.75              # speech probability threshold for Silero (raise to reject more noise)
  speech_threshold: 0.025             # RMS threshold (pre-filter when Silero is on, sole gate when off)
  silence_duration_ms: 600            # ms of silence to end an utterance
  lookback_ms: 250                    # ms of audio to prepend before speech onset
  max_speech_secs: 15                 # max single utterance length
  chunk_ms: 32                        # audio chunk size (32ms required for Silero, 30ms for energy-only)
  min_utterance_secs: 0.8             # reject utterances shorter than this (filters coughs/bumps)
  min_utterance_rms: 0.003            # reject utterances quieter than this (filters background chatter)
